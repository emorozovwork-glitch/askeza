<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="askeza">
<meta name="theme-color" content="#1c1c1e">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22askeza%22%2C%22short_name%22%3A%22askeza%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231c1c1e%22%2C%22theme_color%22%3A%22%231c1c1e%22%7D">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231c1c1e' width='100' height='100' rx='20'/><text y='68' x='50' text-anchor='middle' font-size='55'>🔥</text></svg>">
<title>askeza</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1c1c1e;--surface:#2c2c2e;--surface2:#3a3a3c;
  --text:#f2f2f7;--text2:#8e8e93;--text3:#636366;
  --accent:#2aabee;--accent-dim:rgba(42,171,238,0.12);
  --red:#ff453a;--green:#30d158;--gold:#ffd60a;
  --safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,20px);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bottom)+20px)}

/* === ANIMATIONS === */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes barGrow{from{width:0%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes celBounce{0%{transform:scale(0) rotate(-10deg)}60%{transform:scale(1.15) rotate(2deg)}100%{transform:scale(1) rotate(0)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.animate-in{animation:fadeUp 0.35s ease-out both}
.animate-in:nth-child(1){animation-delay:0.03s}
.animate-in:nth-child(2){animation-delay:0.06s}
.animate-in:nth-child(3){animation-delay:0.09s}
.animate-in:nth-child(4){animation-delay:0.12s}
.animate-in:nth-child(5){animation-delay:0.15s}

/* === TOP BAR === */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;animation:fadeIn 0.3s ease}
.topbar h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:1.5px}
.topbar-right{display:flex;align-items:center;gap:6px}
.menu-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:8px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.2s,transform 0.15s}
.menu-btn:active{background:var(--surface);transform:scale(0.92)}

/* === SIDE MENU === */
/* === HABIT DROPDOWN === */
.hd-backdrop{position:fixed;inset:0;z-index:499;display:none}
.hd-backdrop.open{display:block}
.habit-dropdown{position:fixed;top:calc(var(--safe-top) + 54px);right:12px;width:min(290px,calc(100vw - 24px));background:#1c1c1e;border-radius:14px;z-index:500;transform:translateY(-8px) scale(0.96);transform-origin:top right;opacity:0;pointer-events:none;transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1),opacity 0.18s ease;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.6),0 0 0 0.5px rgba(255,255,255,0.08)}
.habit-dropdown.open{transform:translateY(0) scale(1);opacity:1;pointer-events:all}
.hd-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;padding:11px 14px 6px}
.hd-list{overflow:hidden}
/* Swipe rows */
.sh-wrap{position:relative;overflow:hidden;border-top:1px solid rgba(255,255,255,0.05)}
.sh-wrap:first-child{border-top:none}
.sh-actions{position:absolute;right:0;top:0;bottom:0;display:flex;width:148px}
.sh-act{flex:1;border:none;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;color:#fff;transition:filter 0.15s}
.sh-act:active{filter:brightness(0.85)}
.sh-act-reset{background:#ff9f0a}
.sh-act-del{background:#ff453a}
.sh-row{position:relative;z-index:1;display:flex;align-items:center;padding:11px 14px 11px 10px;gap:10px;cursor:pointer;background:#1c1c1e;will-change:transform;-webkit-user-select:none;user-select:none}
.sh-row.sh-active{background:#252528}
.sh-row:active{background:#222224}
.sh-bar{width:3px;height:36px;border-radius:2px;flex-shrink:0}
.sh-info{flex:1;min-width:0}
.sh-name{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sh-sub{font-size:12px;color:var(--text3);margin-top:1px}
.sh-check{font-size:14px;color:var(--accent);flex-shrink:0}
.hd-add{width:100%;padding:13px 14px;background:none;border:none;border-top:1px solid rgba(255,255,255,0.07);color:var(--accent);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;text-align:left;transition:opacity 0.15s}
.hd-add:active{opacity:0.6}

/* === HABIT HEADER === */
.habit-header{text-align:center;padding:10px 20px 4px;animation:fadeUp 0.3s ease-out}
.habit-name-big{font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.3px}
.habit-sub{text-align:center;font-size:13px;color:var(--text3);padding:0 20px 10px;font-weight:400}

/* === QUOTE === */
.quote-simple{margin:0 32px 14px;text-align:center;font-size:12px;color:var(--text3);line-height:1.6;font-style:italic;cursor:pointer;animation:fadeUp 0.35s ease-out both;animation-delay:0.05s;user-select:none}
.quote-simple span{transition:opacity 0.2s,transform 0.2s;display:inline-block}
.quote-simple:active{opacity:0.6}

/* === PROGRESS CARD (milestone + token merged) === */
.progress-card{margin:0 20px 16px;padding:16px;background:var(--surface);border-radius:16px;cursor:pointer;transition:transform 0.15s,opacity 0.15s;animation:fadeUp 0.35s ease-out both;animation-delay:0.25s}
.progress-card:active{transform:scale(0.98);opacity:0.85}
.pc-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pc-rank{font-size:26px;font-weight:800;font-family:Georgia,serif;min-width:52px;max-width:52px;text-align:center;line-height:1;flex-shrink:0;white-space:nowrap}
.pc-info{flex:1;min-width:0;overflow:hidden}
.pc-current{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-next-label{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-arrow{font-size:20px;color:var(--text3);opacity:0.6}
.pc-bar-track{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-bottom:8px}
.pc-bar-fill{height:100%;border-radius:2px;transition:width 0.8s ease}
.pc-footer{display:flex;justify-content:space-between}
.pc-pct{font-size:12px;color:var(--text2);font-weight:600}
.pc-time{font-size:12px;color:var(--text3)}

/* === ACTIONS SHEET === */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:450;opacity:0;pointer-events:none;transition:opacity 0.25s}
.sheet-overlay.active{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#2c2c2e;border-radius:18px 18px 0 0;padding:0 16px calc(var(--safe-bottom,16px) + 12px);z-index:451;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.25,1,0.5,1)}
.sheet-overlay.active .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:10px auto 14px}
.sheet-item{display:flex;align-items:center;gap:14px;width:100%;padding:14px 4px;border:none;background:none;font-family:inherit;font-size:16px;color:var(--text);cursor:pointer;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06);transition:opacity 0.15s}
.sheet-item:last-of-type{border-bottom:none}
.sheet-item:active{opacity:0.5}
.sheet-item.danger{color:var(--red)}
.sheet-item.warn{color:#ff9f0a}
.sheet-item-icon{font-size:20px;width:28px;text-align:center}
.sheet-cancel{display:block;width:100%;padding:14px;background:var(--surface);border:none;border-radius:14px;font-size:16px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;margin-top:10px}
.sheet-cancel:active{opacity:0.6}

/* === RISK COUNTER === */
.risk-block{margin:0 20px 16px;padding:16px;background:var(--surface);border-radius:14px;animation:fadeUp 0.35s ease-out both;animation-delay:0.08s}
.risk-number{display:flex;align-items:baseline;justify-content:center;gap:1px;font-variant-numeric:tabular-nums}
.risk-int{font-size:36px;font-weight:700;line-height:1}
.risk-dot{font-size:28px;font-weight:700;line-height:1}
.risk-dec{font-size:20px;font-weight:600;line-height:1;opacity:0.7}
.risk-pct{font-size:18px;font-weight:600;margin-left:2px;opacity:0.5;line-height:1}
.risk-phase{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;margin-top:10px}
.risk-center{text-align:center}

/* === TIMER BARS === */
.timer-bars{display:flex;flex-direction:column;gap:6px;padding:0 20px;margin-bottom:16px}
.tbar{position:relative;height:38px;background:var(--surface);border-radius:10px;overflow:visible;animation:fadeUp 0.35s ease-out both}
.tbar:nth-child(1){animation-delay:0.06s}
.tbar:nth-child(2){animation-delay:0.1s}
.tbar:nth-child(3){animation-delay:0.14s}
.tbar:nth-child(4){animation-delay:0.18s}
.tbar:nth-child(5){animation-delay:0.22s}
.tbar-fill{height:100%;border-radius:10px;transition:width 1s cubic-bezier(0.4,0,0.2,1);min-width:2px;animation:barGrow 0.8s ease-out both}
.tbar-text{position:absolute;left:12px;top:0;height:100%;font-size:15px;font-weight:600;color:#fff;white-space:nowrap;display:flex;align-items:center;gap:5px;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,0.4)}
.tbar-text .tbar-num{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;color:#fff}
.tbar-text .tbar-label{font-size:12px;font-weight:500;color:#fff}

/* === MILESTONE === */
.milestone-section{padding:0 20px;margin-bottom:16px;animation:fadeUp 0.35s ease-out both;animation-delay:0.2s}
.milestone-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.milestone-label{font-size:12px;color:var(--text2)}
.milestone-target{font-size:12px;font-weight:600;color:var(--accent)}
.progress-track{height:4px;background:var(--surface);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width 1s cubic-bezier(0.4,0,0.2,1);background:var(--accent)}

/* === TOKENS === */
.tokens-section{padding:0 20px;animation:fadeUp 0.35s ease-out both;animation-delay:0.25s;cursor:pointer}
.tokens-title{font-size:13px;color:var(--text3);font-weight:500;margin-bottom:8px}
.tokens-row{display:flex;gap:6px;flex-wrap:wrap}
.token{font-size:12px;padding:6px 12px;border-radius:8px;font-weight:600;display:flex;align-items:center;gap:4px;transition:transform 0.15s}
.token:active{transform:scale(0.95)}
.token.earned{background:rgba(255,214,10,0.1);color:var(--gold);border:1px solid rgba(255,214,10,0.2)}
.token.locked{background:var(--surface);color:var(--text3);border:none;opacity:0.6;cursor:default}
.token-next-hint{font-size:11px;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:4px}
.token-next-hint span{color:var(--text2);font-weight:500}
.tokens-section-tap{font-size:10px;color:var(--text3);margin-top:5px;letter-spacing:0.2px}

/* === TOKENS PAGE === */
.tokens-page{position:fixed;inset:0;background:var(--bg);z-index:300;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.25,1,0.5,1);overflow-y:auto;padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bottom)+20px)}
.tokens-page.open{transform:translateY(0)}
.tp-topbar{display:flex;align-items:center;padding:14px 20px 8px;gap:12px;position:sticky;top:0;background:var(--bg);z-index:1}
.tp-back{background:none;border:none;color:var(--accent);font-size:26px;font-weight:300;font-family:inherit;cursor:pointer;padding:2px 4px;line-height:1;display:flex;align-items:center}
.tp-title{font-size:17px;font-weight:700;color:var(--text)}
.tp-habit{font-size:13px;color:var(--text3);text-align:center;padding:0 20px 16px}
/* Tier colors */
:root{--bronze:#cd7f32;--silver:#b0b0b8;--gold:#ffd60a;--plat:#bf9fff}
/* Next token card */
.tp-next{margin:0 20px 20px;border-radius:18px;padding:22px 20px 18px;text-align:center;position:relative;overflow:hidden}
.tp-next::before{content:'';position:absolute;inset:0;opacity:0.07;background:radial-gradient(circle at 50% 0%,#fff,transparent 70%)}
.tp-next-tier-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.tp-next-rank{font-size:58px;font-weight:800;font-family:Georgia,serif;line-height:1;margin-bottom:4px}
.tp-next-label{font-size:17px;font-weight:600;color:rgba(255,255,255,0.85);margin-bottom:18px}
.tp-next-bar-track{height:5px;background:rgba(255,255,255,0.12);border-radius:3px;overflow:hidden;margin-bottom:10px}
.tp-next-bar-fill{height:100%;border-radius:3px;transition:width 0.8s ease}
.tp-next-meta{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.55)}
.tp-next-meta strong{color:rgba(255,255,255,0.85);font-weight:700}
.tp-no-next{margin:0 20px 20px;padding:20px;background:var(--surface);border-radius:16px;text-align:center;color:var(--text2);font-size:14px}
/* Section */
.tp-section{padding:0 20px;margin-bottom:8px}
.tp-section-header{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;padding:0 4px}
/* Token row */
.tp-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:14px;margin-bottom:4px;background:rgba(255,255,255,0.03);transition:transform 0.15s}
.tp-row.future{opacity:0.38}
.tp-row-rank{font-size:18px;font-weight:800;font-family:Georgia,serif;min-width:38px;text-align:center;line-height:1}
.tp-row-info{flex:1;min-width:0}
.tp-row-label{font-size:14px;font-weight:600;color:var(--text)}
.tp-row-sub{font-size:11px;color:var(--text3);margin-top:1px}
.tp-tier-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap}

/* === CELEBRATION FLIP === */
@keyframes cardFlip{0%{transform:rotateY(-90deg) scale(0.85);opacity:0}55%{transform:rotateY(8deg) scale(1.06)}100%{transform:rotateY(0deg) scale(1);opacity:1}}

/* === ACTION BUTTONS === */
.action-row{display:flex;gap:16px;padding:12px 20px 8px;justify-content:center;animation:fadeUp 0.35s ease-out both;animation-delay:0.3s}
.action-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;font-weight:500;font-family:inherit;transition:color 0.15s,transform 0.15s;padding:6px 0;display:flex;align-items:center;gap:5px}
.action-btn:active{transform:scale(0.95)}
.action-btn .action-icon{font-size:14px}
.action-btn.danger{color:var(--red)}

/* === EMPTY STATE === */
.empty-state{text-align:center;padding:80px 40px;color:var(--text2);animation:fadeUp 0.4s ease-out}
.empty-state .empty-icon{font-size:56px;margin-bottom:16px}
.empty-state h2{font-size:18px;color:var(--text);margin-bottom:8px;font-weight:600}
.empty-state p{font-size:14px;line-height:1.5;margin-bottom:24px}
.empty-btn{display:inline-block;padding:12px 28px;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:transform 0.15s,opacity 0.15s}
.empty-btn:active{transform:scale(0.96);opacity:0.85}

/* === MODAL === */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{background:#2c2c2e;border-radius:16px;padding:24px 28px 40px;width:calc(100% - 40px);max-width:460px;max-height:80vh;overflow-y:auto;transform:translateY(110%);transition:transform 0.3s cubic-bezier(0.25,1,0.5,1);margin:0 auto 24px}
.modal-overlay.active .modal{transform:translateY(0)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center}
.modal-handle{width:36px;height:4px;background:var(--surface2);border-radius:2px;margin:0 auto 14px}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.form-input{width:100%;background:var(--surface);border:none;border-radius:12px;padding:12px 14px;font-size:16px;color:var(--text);font-family:inherit;outline:none;transition:box-shadow 0.2s}
.form-input:focus{box-shadow:0 0 0 2px var(--accent)}
.preset-picker{display:flex;gap:8px;flex-wrap:wrap}
.preset-btn{padding:8px 14px;border-radius:20px;background:var(--surface);border:2px solid transparent;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.15s;line-height:1}
.preset-btn:active{transform:scale(0.95)}
.preset-btn.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.btn-primary{width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:transform 0.15s,opacity 0.15s}
.btn-primary:active{transform:scale(0.98);opacity:0.85}
.btn-secondary{width:100%;padding:12px;border:none;border-radius:12px;background:var(--surface);color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:8px;transition:transform 0.15s}
.btn-secondary:active{transform:scale(0.98)}

/* === ALL TOKENS MODAL === */
.all-tokens-section{margin-bottom:20px}
.all-tokens-label{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.3px}
.all-tokens-label.active-label{color:var(--gold)}
.all-tokens-label.old-label{color:var(--text3)}
.all-token-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:rgba(255,255,255,0.04);margin-bottom:6px;transition:transform 0.15s}
.all-token-card:active{transform:scale(0.98)}
.all-token-card.old{opacity:0.5}
.all-token-emoji{font-size:22px}
.all-token-info{flex:1}
.all-token-habit{font-size:13px;font-weight:600}
.all-token-detail{font-size:11px;color:var(--text2);margin-top:1px}
.all-token-badge{font-size:11px;padding:3px 10px;border-radius:8px;font-weight:600}
.all-token-badge.active-badge{background:rgba(255,214,10,0.1);color:var(--gold)}
.all-token-badge.old-badge{background:var(--surface);color:var(--text3)}

/* === RISK CHART PAGE === */
.chart-page{position:fixed;inset:0;background:var(--bg);z-index:300;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.25,1,0.5,1);display:flex;flex-direction:column;padding-top:var(--safe-top)}
.chart-page.open{transform:translateY(0)}
.chart-topbar{display:flex;align-items:center;padding:14px 20px 6px;gap:12px}
.chart-back{background:none;border:none;color:var(--accent);font-size:26px;font-weight:300;font-family:inherit;cursor:pointer;padding:2px 4px;line-height:1;display:flex;align-items:center}
.chart-live{padding:4px 20px 8px}
.clr-label{font-size:12px;font-weight:500;color:var(--text3);letter-spacing:0.3px;display:block;margin-bottom:2px}
.chart-live-num{display:inline-flex;align-items:baseline;gap:1px;font-variant-numeric:tabular-nums}
.clr-int{font-size:48px;font-weight:700;line-height:1}
.clr-dot{font-size:36px;font-weight:700;line-height:1}
.clr-dec{font-size:26px;font-weight:600;line-height:1;opacity:.8}
.clr-pct{font-size:22px;font-weight:600;margin-left:3px;opacity:.5;line-height:1;color:var(--text)}
.clr-motive{font-size:13px;color:var(--text2);margin-top:5px;line-height:1.4}
.chart-range{display:flex;gap:6px;padding:6px 16px 10px;justify-content:center}
.crb{background:rgba(255,255,255,0.08);border:none;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.crb.active{background:rgba(255,255,255,0.18);color:#fff}
.crb:active{transform:scale(0.95)}
.chart-canvas-wrap{flex:1;padding:0 8px;min-height:0;position:relative;touch-action:none;display:flex;align-items:stretch}
.chart-canvas-wrap canvas{width:100%!important;height:100%!important;display:block;cursor:crosshair}
.chart-info{padding:2px 20px 10px;font-size:11px;color:var(--text3);text-align:center}

/* === CELEBRATION === */
.celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,0.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:600;opacity:0;pointer-events:none;transition:opacity 0.3s}
.celebration.active{opacity:1;pointer-events:all}
.celebration .cel-emoji{font-size:72px;animation:cardFlip 0.55s cubic-bezier(0.25,1,0.5,1) both;perspective:600px}
.celebration .cel-title{font-size:24px;font-weight:700;margin:16px 0 8px;text-align:center;padding:0 20px}
.celebration .cel-sub{font-size:14px;color:var(--text2);text-align:center;max-width:280px;line-height:1.5}
.celebration .btn-primary{width:auto;padding:12px 36px;margin-top:24px}

.confetti-piece{position:fixed;width:8px;height:8px;z-index:501;pointer-events:none;border-radius:2px;animation:confettiFall 2.5s ease-out forwards}

/* === ADD HABIT PAGE === */
.add-page{position:fixed;inset:0;background:var(--bg);z-index:300;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.25,1,0.5,1);overflow-y:auto;padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bottom)+24px)}
.add-page.open{transform:translateY(0)}
.add-topbar{display:flex;align-items:center;padding:10px 20px 6px;gap:12px;position:sticky;top:0;background:var(--bg);z-index:1}
.add-cancel{background:none;border:none;color:var(--accent);font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;padding:4px 0}
.add-title{font-size:17px;font-weight:700;color:var(--text)}

/* Preset cards */
.add-presets{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:6px 20px 10px}
.add-preset-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 12px 10px;background:var(--surface);border-radius:16px;cursor:pointer;transition:transform 0.15s,background 0.2s,box-shadow 0.2s;border:2px solid transparent;gap:5px;user-select:none}
.add-preset-card:active{transform:scale(0.96)}
.add-preset-card.sel{border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.08)!important;box-shadow:none}
.add-preset-emoji{font-size:26px;line-height:1}
.add-preset-name{font-size:13px;font-weight:600;color:var(--text2)}
.add-preset-card.sel .add-preset-name{font-weight:700}

/* Custom name */
.add-custom-wrap{padding:0 20px 12px;animation:fadeUp 0.2s ease-out}
.add-custom-input{width:100%;background:var(--surface);border:none;border-radius:14px;padding:14px 16px;font-size:17px;color:var(--text);font-family:inherit;outline:none;transition:box-shadow 0.2s}
.add-custom-input:focus{box-shadow:0 0 0 2px var(--accent)}

/* Drum picker */
.picker-section{margin:0 20px 12px}
.picker-section-label{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;padding:0 2px}
.picker-row{display:flex;align-items:stretch;background:var(--surface);border-radius:16px;overflow:hidden;position:relative;height:132px}
.picker-hl{position:absolute;top:50%;left:0;right:0;height:44px;transform:translateY(-50%);background:rgba(255,255,255,0.07);pointer-events:none;z-index:2;border-radius:0}
.picker-fade{position:absolute;inset:0;background:linear-gradient(to bottom,var(--surface) 0%,transparent 30%,transparent 70%,var(--surface) 100%);pointer-events:none;z-index:3}
.picker-col{flex:1;height:132px;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;text-align:center}
.picker-col::-webkit-scrollbar{display:none}
.picker-item{height:44px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;font-size:18px;font-weight:500;color:var(--text)}
.picker-sep{width:28px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--text2);flex-shrink:0;position:relative;z-index:4}
.picker-divider{width:1px;background:rgba(255,255,255,0.06);flex-shrink:0;position:relative;z-index:4}

/* CTA button */
.add-cta{display:block;width:calc(100% - 40px);margin:4px 20px 0;padding:14px;border:none;border-radius:16px;font-size:17px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;transition:transform 0.15s,opacity 0.15s;letter-spacing:0.2px}
.add-cta:active{transform:scale(0.98);opacity:0.88}
.add-cta:disabled{opacity:0.35;pointer-events:none}

/* === SUPPRESS ANIMATIONS AFTER INIT (body.app-ready) === */
body.app-ready .habit-header,
body.app-ready .quote-simple,
body.app-ready .risk-block,
body.app-ready .tbar,
body.app-ready .tbar-fill,
body.app-ready .progress-card,
body.app-ready .tokens-section,
body.app-ready .milestone-section,
body.app-ready .action-row,
body.app-ready .topbar{animation:none!important}
</style>
</head>
<body>
<div id="app"></div>
<script>
const STORAGE_KEY='askeza_data';
(function(){const o=localStorage.getItem('quittrack_data');if(o&&!localStorage.getItem(STORAGE_KEY))localStorage.setItem(STORAGE_KEY,o)})();

const MILESTONES=[
  {label:'Начало',      sec:60,       rank:'XX'},
  {label:'1 час',       sec:3600,     rank:'XIX'},
  {label:'3 часа',      sec:10800,    rank:'XVIII'},
  {label:'6 часов',     sec:21600,    rank:'XVII'},
  {label:'12 часов',    sec:43200,    rank:'XVI'},
  {label:'1 день',      sec:86400,    rank:'XV'},
  {label:'2 дня',       sec:172800,   rank:'XIV'},
  {label:'3 дня',       sec:259200,   rank:'XIII'},
  {label:'5 дней',      sec:432000,   rank:'XII'},
  {label:'1 неделя',    sec:604800,   rank:'XI'},
  {label:'10 дней',     sec:864000,   rank:'X'},
  {label:'2 недели',    sec:1209600,  rank:'IX'},
  {label:'3 недели',    sec:1814400,  rank:'VIII'},
  {label:'1 месяц',     sec:2592000,  rank:'VII'},
  {label:'6 недель',    sec:3628800,  rank:'VI'},
  {label:'2 месяца',    sec:5184000,  rank:'V'},
  {label:'3 месяца',    sec:7776000,  rank:'IV'},
  {label:'4 месяца',    sec:10368000, rank:'III'},
  {label:'6 месяцев',   sec:15552000, rank:'II'},
  {label:'1 год',       sec:31536000, rank:'I'},
];

const QUOTES=[
  "Ты уже дальше, чем вчера. Продолжай!",
  "Каждая секунда без привычки — это победа над собой",
  "Ты сильнее, чем думаешь. Доказательство — прямо перед тобой",
  "Сила воли — это мышца. И ты качаешь её прямо сейчас",
  "В будущем ты скажешь себе спасибо",
  "Маленькие победы складываются в большие перемены",
  "Привычка — это цепь. Каждый день ты разбиваешь ещё одно звено",
  "Сегодня тяжело. Завтра станет легче. Послезавтра — ещё легче",
  "Дискомфорт — это цена роста. И ты уже платишь",
  "Каждый раз, когда ты говоришь «нет» привычке, ты говоришь «да» себе",
  "Ты меняешь минуту дискомфорта на годы свободы",
  "То, что тянет тебя назад — не сильнее тебя",
  "Тяга временна. Гордость за себя — навсегда",
  "Свобода начинается там, где заканчивается привычка",
  "Не жди мотивации. Будь дисциплиной",
  "Вчерашний ты начал. Сегодняшний — продолжает",
  "Ты меняешься прямо сейчас. С каждой секундой",
  "Слабость кричит. Сила действует молча",
  "Сегодня ты сильнее, чем вчера. Завтра — сильнее, чем сегодня",
];

const HABIT_PRESETS=[
  {name:'Курение',   emoji:'🚭', color:'#ff453a'},
  {name:'Алкоголь',  emoji:'🍷', color:'#ff9f0a'},
  {name:'Марихуана', emoji:'🌿', color:'#4cd964'},
];
const BAR_COLORS=[
  ['#ff3830','#cc0808'],  // years   — красный,  насыщенность 100%
  ['#f07810','#c05000'],  // months  — оранжевый, насыщенность 85%
  ['#30a8e0','#1080c0'],  // days    — голубой,   насыщенность 70%
  ['#5050c8','#3535a0'],  // hours   — синий,     насыщенность 55%
  ['#7a6090','#5a4070'],  // minutes — сиренево-серый, насыщенность 30%
  ['#a0a0a8','#787880'],  // seconds — почти серый,    насыщенность 5%
];

function loadData(){try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY));return d&&d.habits?d:{habits:[]}}catch{return{habits:[]}}}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch{}}
function getElapsed(qd){
  const diff=Math.max(0,(Date.now()-new Date(qd).getTime())/1000);
  const years=Math.floor(diff/31536000);const rem0=diff%31536000;
  const months=Math.floor(rem0/2592000);const rem=rem0%2592000;
  const days=Math.floor(rem/86400);const hours=Math.floor((rem%86400)/3600);
  const minutes=Math.floor((rem%3600)/60);const seconds=Math.floor(rem%60);
  return{totalSeconds:diff,years,months,days,hours,minutes,seconds};
}
function getCurrentMilestone(ts){let c=null,n=null;for(const m of MILESTONES){if(ts>=m.sec)c=m;else{n=m;break}}return{current:c,next:n}}
function getMilestoneProgress(ts,nxt){if(!nxt)return 100;const i=MILESTONES.indexOf(nxt);const p=i>0?MILESTONES[i-1].sec:0;return Math.min(100,((ts-p)/(nxt.sec-p))*100)}
function getEarnedBadges(ts){return MILESTONES.filter(m=>ts>=m.sec)}
function getTopBadge(ts){const earned=getEarnedBadges(ts);return earned.length>0?earned[earned.length-1]:null}
// From an array of old tokens, return only the one matching the highest milestone
function getTopOldToken(oldTokens){
  if(!oldTokens||oldTokens.length===0)return null;
  let best=null,bestIdx=-1;
  oldTokens.forEach(t=>{
    const idx=MILESTONES.findIndex(m=>m.label===t.label);
    if(idx>bestIdx){bestIdx=idx;best=t;}
  });
  return best;
}

// Craving — Smoking (горб отмены, пик ~102% в 14ч, плато 7%)
function riskFromSeconds(s){const d=s/86400;return 7+73/Math.pow(1+d,0.55)+133*d*Math.exp(-1.2*d)}
function speedFromSeconds(s){const d=s/86400;return -40.15/(86400*Math.pow(1+d,1.55))+133*(1-1.2*d)*Math.exp(-1.2*d)/86400}
function getRiskDecimals(s){const spd=Math.abs(speedFromSeconds(s));const c=spd*0.1;if(c<=0)return 8;return Math.max(4,Math.ceil(-Math.log10(c))+1)}

// Risk calculations — Alcohol (B=0.30)
function alcRisk(s){return 88/Math.pow(1+s/86400,0.30)+4}
function alcSpeed(s){return -88*0.30/(86400*Math.pow(1+s/86400,1.30))}
function getAlcDecimals(s){const spd=Math.abs(alcSpeed(s));const c=spd*0.1;if(c<=0)return 8;return Math.max(4,Math.ceil(-Math.log10(c))+1)}

// Risk calculations — Marijuana (B=0.40)
function weedRisk(s){return 85/Math.pow(1+s/86400,0.40)+5}
function weedSpeed(s){return -85*0.40/(86400*Math.pow(1+s/86400,1.40))}
function getWeedDecimals(s){const spd=Math.abs(weedSpeed(s));const c=spd*0.1;if(c<=0)return 8;return Math.max(4,Math.ceil(-Math.log10(c))+1)}

// Risk calculations — Generic (B=0.7134, для своей привычки)
function genericRisk(s){return 90/Math.pow(1+s/86400,0.7134)}
function genericSpeedFn(s){return -90*0.7134/(86400*Math.pow(1+s/86400,1.7134))}
function getGenericDecimals(s){const spd=Math.abs(genericSpeedFn(s));const c=spd*0.1;if(c<=0)return 8;return Math.max(4,Math.ceil(-Math.log10(c))+1)}

function getTokenTier(idx){
  if(idx<5)return{name:'Бронза',color:'var(--bronze)',bg:'rgba(205,127,50,0.15)',glow:'rgba(205,127,50,0.35)'};
  if(idx<10)return{name:'Серебро',color:'var(--silver)',bg:'rgba(176,176,184,0.15)',glow:'rgba(176,176,184,0.35)'};
  if(idx<15)return{name:'Золото',color:'var(--gold)',bg:'rgba(255,214,10,0.15)',glow:'rgba(255,214,10,0.35)'};
  return{name:'Платина',color:'var(--plat)',bg:'rgba(191,159,255,0.15)',glow:'rgba(191,159,255,0.35)'};
}
function formatTimeLeft(secs){
  if(secs<=0)return'—';
  const d=Math.floor(secs/86400),h=Math.floor((secs%86400)/3600),m=Math.floor((secs%3600)/60);
  if(d>0)return d+' дн '+(h>0?h+' ч':'');
  if(h>0)return h+' ч '+(m>0?m+' мин':'');
  return m+' мин';
}
function isAlcohol(name){return name&&/алкоголь/i.test(name)}
function isWeed(name){return name&&/марихуан|конопл/i.test(name)}
function isSmoking(name){return name&&/курен/i.test(name)}
function getRiskFns(name){
  if(isAlcohol(name))return{riskFn:alcRisk,decFn:getAlcDecimals};
  if(isWeed(name))return{riskFn:weedRisk,decFn:getWeedDecimals};
  if(isSmoking(name))return{riskFn:riskFromSeconds,decFn:getRiskDecimals};
  return{riskFn:genericRisk,decFn:getGenericDecimals};
}

function getRiskPhase(risk,alc){
  if(alc){
    if(risk>60)return{label:'Критическая зона',color:'#ff453a',bg:'rgba(255,69,58,0.12)'};
    if(risk>35)return{label:'Опасный период',color:'#ff9f0a',bg:'rgba(255,159,10,0.12)'};
    if(risk>15)return{label:'Становится легче',color:'#ffd60a',bg:'rgba(255,214,10,0.12)'};
    return{label:'Минимальный риск',color:'#30d158',bg:'rgba(48,209,88,0.12)'};
  }
  if(risk>50)return{label:'Критическая зона',color:'#ff453a',bg:'rgba(255,69,58,0.12)'};
  if(risk>20)return{label:'Опасный период',color:'#ff9f0a',bg:'rgba(255,159,10,0.12)'};
  if(risk>8)return{label:'Становится легче',color:'#ffd60a',bg:'rgba(255,214,10,0.12)'};
  return{label:'Минимальный риск',color:'#30d158',bg:'rgba(48,209,88,0.12)'};
}
function formatMenuTime(el){
  if(el.totalSeconds<120)return'только что начал';
  if(el.years>0)return el.years+' '+(el.years===1?'год':el.years<5?'года':'лет')+(el.months>0?' '+el.months+' мес.':'');
  if(el.months>0)return el.months+' мес.'+(el.days>0?' '+el.days+' дн.':'');
  if(el.days>0)return el.days+' '+(el.days===1?'день':el.days<5?'дня':'дней');
  if(el.hours>0)return el.hours+' ч.';
  return Math.floor(el.totalSeconds/60)+' мин.';
}
function getSmokingPhase(v){
  if(v>90)return{label:'Тяга нарастает',color:'#ff453a',bg:'rgba(255,69,58,0.12)'};
  if(v>75)return{label:'Пик синдрома отмены',color:'#ff6930',bg:'rgba(255,105,48,0.12)'};
  if(v>50)return{label:'Тяга убывает',color:'#ff9f0a',bg:'rgba(255,159,10,0.12)'};
  if(v>25)return{label:'Становится легче',color:'#ffd60a',bg:'rgba(255,214,10,0.12)'};
  if(v>10)return{label:'Тяга слабеет',color:'#30d158',bg:'rgba(48,209,88,0.12)'};
  return{label:'Минимальная тяга',color:'#30d158',bg:'rgba(48,209,88,0.12)'};
}
function getPhaseForHabit(value,name){
  if(isSmoking(name))return getSmokingPhase(value);
  return getRiskPhase(value,isAlcohol(name));
}
function getMetricLabel(name){return isSmoking(name)?'Тяга':'Шанс рецидива'}
function getChartMotive(risk,name){
  if(isSmoking(name)){
    if(risk>=90)return'Первые часы самые тяжёлые — это нормально';
    if(risk>=75)return'Пик уже близко. После него — только легче';
    if(risk>=50)return'Тяга пошла на спад. Худшее позади';
    if(risk>=25)return'С каждым днём тяга слабеет';
    if(risk>=10)return'Ты почти свободен';
    return'Тяга больше не управляет тобой';
  }
  if(risk>=80)return'Первые шаги — самые тяжёлые. Именно сейчас ты сильнее всего';
  if(risk>=50)return'Тело перестраивается. Тяга временна — свобода навсегда';
  if(risk>=25)return'Самое страшное уже позади. Ты это прошёл';
  if(risk>=10)return'Каждый день делает тебя чуть свободнее';
  if(risk>=5)return'Самый сложный период уже позади';
  if(risk>=1)return'Это больше не власть над тобой';
  return'Ты победил. Береги это';
}
let currentQuoteIndex=Math.floor(Math.random()*QUOTES.length);
function getQuote(){return QUOTES[currentQuoteIndex]}
function refreshQuote(){
  let next;
  do{next=Math.floor(Math.random()*QUOTES.length)}while(next===currentQuoteIndex&&QUOTES.length>1);
  currentQuoteIndex=next;
  const el=document.querySelector('.quote-simple span');
  if(el){el.style.opacity='0';el.style.transform='translateY(4px)';setTimeout(()=>{el.textContent=QUOTES[currentQuoteIndex];el.style.opacity='1';el.style.transform='translateY(0)'},200)}
}
function pad(n){return String(n).padStart(2,'0')}
function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
function fmtDate(d){return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'})}

function countAllTokens(){
  let active=0,old=0;
  data.habits.forEach(h=>{
    if(getTopBadge(getElapsed(h.quitDate).totalSeconds))active++;
    if(getTopOldToken(h.oldTokens))old++;
  });
  return{active,old,total:active+old};
}

let data=loadData();
let activeHabitId=data.habits.length>0?data.habits[0].id:null;
let sideMenuOpen=false;
let activeModal=null;
let editingId=null;
let celebrationData=null;
let checkedMilestones={};
let formName='',formEmoji='',formColor='#2aabee',formDate='',formTime='';
let chartRange=365;
let chartLiveInterval=null;
let chartAnimRAF=null;
let chartPulseRAF=null;
let chartAnimStart=null;
let chartActiveTouchDay=null;
const CHART_ANIM_MS=900;
let addPageSelectedPreset=null; // preset index 0-2 or 'custom'
let pickerState={};

function render(){
  const app=document.getElementById('app');
  const h=data.habits.find(x=>x.id===activeHabitId);
  const tokens=countAllTokens();
  let html='';

  // Top bar
  html+=`<div class="topbar">
    <h1>askeza <span style="font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.5px;vertical-align:middle">v1.1</span></h1>
    <div class="topbar-right">
      ${h?`<button class="menu-btn" onclick="openHabitActions('${h.id}')" style="font-size:22px;letter-spacing:1px;padding-bottom:10px">···</button>`:''}
      <button class="menu-btn" onclick="toggleSideMenu()">☰</button>
    </div>
  </div>`;

  if(h){
    const e=getElapsed(h.quitDate);
    const{current,next}=getCurrentMilestone(e.totalSeconds);
    const progress=getMilestoneProgress(e.totalSeconds,next);
    const color=h.color||'#2aabee';

    // Habit title
    html+=`<div class="habit-header"><span class="habit-name-big">${h.name}</span></div>`;
    html+=`<div class="habit-sub">свобода с ${fmtDate(h.quitDate)}</div>`;

    // Quote
    html+=`<div class="quote-simple" onclick="refreshQuote()"><span>${getQuote()}</span></div>`;

    // Risk counter
    const riskS=e.totalSeconds;
    const {riskFn,decFn}=getRiskFns(h.name);
    const risk=riskFn(riskS);
    const rDec=decFn(riskS);
    const phase=getPhaseForHabit(risk,h.name);
    const riskStr=risk.toFixed(rDec);
    const dotIdx=riskStr.indexOf('.');
    const rInt=riskStr.substring(0,dotIdx);
    const rFrac=riskStr.substring(dotIdx+1);
    html+=`<div class="risk-block" data-quit="${h.quitDate}" data-name="${h.name}" onclick="openRiskChart()" style="cursor:pointer">
      <div class="risk-center">

    // Progress card (milestone + token merged)
    const topBadge=getTopBadge(e.totalSeconds);
    const topIdx=topBadge?MILESTONES.indexOf(topBadge):-1;

  } else {

// === ACTIONS ===
function toggleSideMenu(){
  sideMenuOpen=!sideMenuOpen;
  const dd=document.getElementById('habit-dropdown');
  const bd=document.querySelector('.hd-backdrop');
  if(dd)dd.classList.toggle('open',sideMenuOpen);
  if(bd)bd.classList.toggle('open',sideMenuOpen);
  if(sideMenuOpen)setTimeout(initHabitSwipes,60);
}
function closeSideMenu(){
  sideMenuOpen=false;
  _swipeOpen=null;
  const dd=document.getElementById('habit-dropdown');
  const bd=document.querySelector('.hd-backdrop');
  if(dd)dd.classList.remove('open');
  if(bd)bd.classList.remove('open');
}
function selectHabit(id){activeHabitId=id;closeSideMenu();document.body.classList.remove('app-ready');render();setTimeout(()=>document.body.classList.add('app-ready'),450)}

let _swipeOpen=null; // currently open swipe row
function initHabitSwipes(){
  const SNAP=148;
  document.querySelectorAll('.sh-row').forEach(row=>{
    if(row._swipeInit)return;
    row._swipeInit=true;
    let x0,y0,tracking=false,base=0;
    row.addEventListener('touchstart',e=>{
      x0=e.touches[0].clientX;y0=e.touches[0].clientY;tracking=false;
      base=(row===_swipeOpen?-SNAP:0);
    },{passive:true});
    row.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-x0,dy=e.touches[0].clientY-y0;
      if(!tracking){if(Math.abs(dy)>Math.abs(dx))return;tracking=true;}
      e.preventDefault();
      const nx=Math.max(-SNAP,Math.min(0,base+dx));
      row.style.transition='none';
      row.style.transform=`translateX(${nx}px)`;
    },{passive:false});
    row.addEventListener('touchend',e=>{
      if(!tracking)return;
      const dx=e.changedTouches[0].clientX-x0;
      row.style.transition='transform 0.25s cubic-bezier(0.25,1,0.5,1)';
      if(base+dx<-SNAP/2){
        if(_swipeOpen&&_swipeOpen!==row)closeSwipeRow(_swipeOpen);
        _swipeOpen=row;
        row.style.transform=`translateX(${-SNAP}px)`;
      } else {
        if(_swipeOpen===row)_swipeOpen=null;
        row.style.transform='';
      }
    },{passive:true});
  });
}
function closeSwipeRow(row){if(!row)return;row.style.transition='transform 0.25s cubic-bezier(0.25,1,0.5,1)';row.style.transform='';}
function swipeReset(id){closeSwipeRow(_swipeOpen);_swipeOpen=null;closeSideMenu();resetStreak(id);}
function swipeDel(id){closeSwipeRow(_swipeOpen);_swipeOpen=null;closeSideMenu();deleteHabit(id);}
function openTokensPage(){activeModal='tokensPage';document.getElementById('tokens-page').classList.add('open')}
function openAllTokens(){openTokensPage()}
function closeTokensPage(){activeModal=null;document.getElementById('tokens-page').classList.remove('open')}
function openHabitActions(id){activeModal='habitActions';document.querySelector('.sheet-overlay').classList.add('active')}
function closeHabitActions(){activeModal=null;document.querySelector('.sheet-overlay').classList.remove('active')}

function openAddPage(){
  addPageSelectedPreset=null;
  formName='';formColor='#2aabee';
  const n=new Date();formDate=n.toISOString().split('T')[0];formTime=pad(n.getHours())+':'+pad(n.getMinutes());
  closeSideMenu();
  activeModal='addPage';
  document.getElementById('add-page').classList.add('open');
  setTimeout(initAddPickers,80);
}
function closeAddPage(){
  activeModal=null;
  document.getElementById('add-page').classList.remove('open');
}
function addSelectPreset(idx){
  addPageSelectedPreset=idx;
  // Update card visuals
  const cards=document.querySelectorAll('.add-preset-card');
  cards.forEach((card,i)=>{
    const isCustom=i===HABIT_PRESETS.length;
    const isSel=(isCustom&&idx==='custom')||(!isCustom&&idx===i);
    card.classList.toggle('sel',isSel);
    card.style.background='';
  });
  // Show/hide custom input
  let cw=document.querySelector('.add-custom-wrap');
  if(idx==='custom'){
    if(!cw){
      cw=document.createElement('div');cw.className='add-custom-wrap';
      cw.innerHTML=`<input class="add-custom-input" id="add-name-input" placeholder="Название привычки" autocomplete="off" autocorrect="off">`;
      document.querySelector('.picker-section').before(cw);
    }
    formName='';
    document.getElementById('add-name-input').addEventListener('input',e=>{formName=e.target.value;updateAddCta()});
    setTimeout(()=>document.getElementById('add-name-input')?.focus(),100);
  }else{
    cw?.remove();
    const p=HABIT_PRESETS[idx];
    formName=p.name;formColor=p.color;
  }
  updateAddCta();
}
function updateAddCta(){
  const btn=document.getElementById('add-cta-btn');if(!btn)return;
  btn.style.background=addPageSelectedPreset!==null?'#34C759':'#636366';
  const ready=addPageSelectedPreset!==null&&(addPageSelectedPreset!=='custom'||formName.trim().length>0);
  btn.disabled=!ready;
}
function saveNewHabit(){
  const name=formName.trim();if(!name)return;
  const color=addPageSelectedPreset!=='custom'&&addPageSelectedPreset!==null?HABIT_PRESETS[addPageSelectedPreset].color:formColor;
  const qd=new Date(formDate+'T'+(formTime||'00:00')).toISOString();
  const newH={id:'h_'+Date.now(),name,emoji:'',color,quitDate:qd,bestStreak:0,oldTokens:[]};
  data.habits.push(newH);activeHabitId=newH.id;
  saveData(data);
  closeAddPage();
  document.body.classList.remove('app-ready');render();
  setTimeout(()=>document.body.classList.add('app-ready'),450);
}
function updateFormDate(){
  const d=new Date(pickerState.year,pickerState.month,pickerState.day+1,pickerState.hour,pickerState.min);
  formDate=[d.getFullYear(),pad(d.getMonth()+1),pad(d.getDate())].join('-');
  formTime=pad(d.getHours())+':'+pad(d.getMinutes());
}
function initAddPickers(){
  const ITEM_H=44,SPACER=44;
  const now=new Date();
  const curYear=now.getFullYear();
  pickerState={year:curYear,month:now.getMonth(),day:now.getDate()-1,hour:now.getHours(),min:now.getMinutes()};
  const yearItems=[];for(let y=curYear;y>=2010;y--)yearItems.push(String(y));
  const monthNames=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  function getDays(y,m){const c=new Date(y,m+1,0).getDate();return Array.from({length:c},(_,i)=>String(i+1));}
  function refreshDayDrum(){
    const days=getDays(pickerState.year,pickerState.month);
    const idx=Math.min(pickerState.day,days.length-1);pickerState.day=idx;
    setupDrum('picker-day',days,idx,SPACER,ITEM_H,i=>{pickerState.day=i;updateFormDate();});
  }
  const hourItems=Array.from({length:24},(_,i)=>pad(i));
  const minItems=Array.from({length:60},(_,i)=>pad(i));
  setupDrum('picker-year',yearItems,0,SPACER,ITEM_H,i=>{pickerState.year=curYear-i;refreshDayDrum();updateFormDate();});
  setupDrum('picker-month',monthNames,now.getMonth(),SPACER,ITEM_H,i=>{pickerState.month=i;refreshDayDrum();updateFormDate();});
  setupDrum('picker-day',getDays(curYear,now.getMonth()),now.getDate()-1,SPACER,ITEM_H,i=>{pickerState.day=i;updateFormDate();});
  setupDrum('picker-hour',hourItems,now.getHours(),SPACER,ITEM_H,i=>{pickerState.hour=i;updateFormDate();});
  setupDrum('picker-min',minItems,now.getMinutes(),SPACER,ITEM_H,i=>{pickerState.min=i;updateFormDate();});
  updateFormDate();
}
function setupDrum(id,items,defaultIdx,spacer,itemH,onChange){
  const old=document.getElementById(id);if(!old)return;
  const el=old.cloneNode(false);
  old.parentNode.replaceChild(el,old);
  el.innerHTML=`<div style="height:${spacer}px;flex-shrink:0"></div>`+
    items.map(l=>`<div class="picker-item">${l}</div>`).join('')+
    `<div style="height:${spacer}px;flex-shrink:0"></div>`;
  requestAnimationFrame(()=>{el.scrollTop=defaultIdx*itemH});
  let t;
  el.addEventListener('scroll',()=>{
    clearTimeout(t);
    t=setTimeout(()=>{
      const idx=Math.max(0,Math.min(Math.round(el.scrollTop/itemH),items.length-1));
      onChange(idx);
    },80);
  },{passive:true});
}

function openAddModal(){openAddPage()}
function selectPreset(n,c){formName=n;formColor=c}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;activeModal=null;editingId=null;render()}

function saveHabit(){
  const name=formName.trim();if(!name)return;
  const qd=new Date(formDate+'T'+(formTime||'00:00')).toISOString();
  if(editingId){
    const h=data.habits.find(x=>x.id===editingId);

  }else{
    const newH={id:'h_'+Date.now(),name,emoji:formEmoji,color:formColor,quitDate:qd,bestStreak:0,oldTokens:[]};
    data.habits.push(newH);
    activeHabitId=newH.id;
  }

}

function editHabit(id){
  const h=data.habits.find(x=>x.id===id);if(!h)return;
  activeModal='edit';editingId=id;formName=h.name;formEmoji=h.emoji;formColor=h.color;

function resetStreak(id){
  if(!confirm('Сбросить отсчёт? Текущий жетон перейдёт в «старые».'))return;
  const h=data.habits.find(x=>x.id===id);
  if(h){
    const el=getElapsed(h.quitDate);
    h.bestStreak=Math.max(h.bestStreak||0,el.days);
    if(!h.oldTokens)h.oldTokens=[];
    const topM=getTopBadge(el.totalSeconds);
    if(topM){
      const resetDate=new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
      h.oldTokens.push({rank:topM.rank,label:topM.label,date:resetDate});
    }
    h.quitDate=new Date().toISOString();
    checkedMilestones[h.id]=0;
  }
  saveData(data);render();
}

function deleteHabit(id){
  if(!confirm('Удалить эту привычку?'))return;
  data.habits=data.habits.filter(x=>x.id!==id);
  if(activeHabitId===id)activeHabitId=data.habits.length>0?data.habits[0].id:null;
  saveData(data);render();
}

function closeCelebration(){celebrationData=null;render()}

function spawnConfetti(){
  const cols=['#ffd60a','#ff453a','#30d158','#2aabee','#bf5af2','#ff9f0a'];
  for(let i=0;i<50;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.background=cols[Math.floor(Math.random()*cols.length)];el.style.animationDelay=Math.random()*0.8+'s';el.style.animationDuration=(1.5+Math.random()*1.5)+'s';el.style.width=(5+Math.random()*6)+'px';el.style.height=(5+Math.random()*6)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),3000)}
}

// === TIMER LOOP ===
function updateTimers(){
  document.querySelectorAll('.timer-bars').forEach(container=>{
    const quit=container.dataset.quit;if(!quit)return;
    const e=getElapsed(quit);
    const barData=[
      {v:e.years,max:10,key:'years'},
      {v:e.months,max:12,key:'months'},
      {v:e.days,max:30,key:'days'},
      {v:e.hours,max:24,key:'hours'},
      {v:e.minutes,max:60,key:'minutes'},
      {v:e.seconds,max:60,key:'seconds'},
    ];
    barData.forEach(b=>{
      const tbar=container.querySelector(`[data-bar-key="${b.key}"]`);
      if(!tbar)return;
      if(b.v>0){
        tbar.style.display='';
        const fill=tbar.querySelector('.tbar-fill');
        if(fill)fill.style.width=Math.min(100,(b.v/b.max)*100)+'%';
        const num=tbar.querySelector('.tbar-num');
        if(num)num.textContent=b.v;
      }else{
        tbar.style.display='none';
      }
    });
  });

  // Check milestones
  data.habits.forEach(h=>{
    const e=getElapsed(h.quitDate);const key=h.id;
    if(!checkedMilestones[key])checkedMilestones[key]=0;
    const earned=getEarnedBadges(e.totalSeconds);
    if(earned.length>checkedMilestones[key]){
      const m=earned[earned.length-1];checkedMilestones[key]=earned.length;
      const diff=e.totalSeconds-m.sec;
      if(diff<3&&!celebrationData){
        celebrationData={rank:m.rank,title:`Уровень ${m.rank}`,subtitle:`${h.name} · ${m.label}`,color:h.color};
        spawnConfetti();render();
      }
    }
  });

  const h=data.habits.find(x=>x.id===activeHabitId);
  if(h){
    const e=getElapsed(h.quitDate);
    const{next}=getCurrentMilestone(e.totalSeconds);
    const p=getMilestoneProgress(e.totalSeconds,next);
    const fill=document.querySelector('.progress-fill');
    if(fill)fill.style.width=p+'%';
  }

  requestAnimationFrame(updateTimers);
}

// Init
data.habits.forEach(h=>{
  if(!h.oldTokens)h.oldTokens=[];
  checkedMilestones[h.id]=getEarnedBadges(getElapsed(h.quitDate).totalSeconds).length;
});
if(!activeHabitId&&data.habits.length>0)activeHabitId=data.habits[0].id;
render();requestAnimationFrame(updateTimers);setTimeout(()=>document.body.classList.add('app-ready'),500);

// === RISK CHART ===

function openRiskChart(){
  activeModal='riskChart';
  const h=data.habits.find(x=>x.id===activeHabitId);
  if(h){
    const days=getElapsed(h.quitDate).totalSeconds/86400;
    if(days>365)chartRange=1825;
    else if(days>180)chartRange=365;
    else if(days>90)chartRange=180;
    else if(days>30)chartRange=90;
    else chartRange=30;
    document.querySelectorAll('.crb').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.days)===chartRange));
  }
  chartActiveTouchDay=null;
  document.getElementById('chart-page').classList.add('open');
  setTimeout(()=>{
    setupChartInteraction();
    startChartAnimation();
    if(chartLiveInterval)clearInterval(chartLiveInterval);
    chartLiveInterval=setInterval(updateChartLive,100);
  },50);
}

function closeRiskChart(){
  activeModal=null;
  stopChartAnimation();
  if(chartLiveInterval){clearInterval(chartLiveInterval);chartLiveInterval=null;}
  document.getElementById('chart-page').classList.remove('open');
}

function setChartRange(days){
  chartRange=days;
  document.querySelectorAll('.crb').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.days)===days));
  chartActiveTouchDay=null;
  startChartAnimation();
}

function startChartAnimation(){
  stopChartAnimation();
  chartAnimStart=null;
  function step(ts){
    if(!chartAnimStart)chartAnimStart=ts;
    const t=Math.min((ts-chartAnimStart)/CHART_ANIM_MS,1);
    const eased=1-Math.pow(1-t,3);
    drawRiskChart(chartActiveTouchDay,eased,ts);
    if(t<1){chartAnimRAF=requestAnimationFrame(step);}
    else{chartAnimRAF=null;startPulseLoop();}
  }
  chartAnimRAF=requestAnimationFrame(step);
}

function startPulseLoop(){
  if(chartPulseRAF)cancelAnimationFrame(chartPulseRAF);
  function step(ts){
    drawRiskChart(chartActiveTouchDay,1,ts);
    chartPulseRAF=requestAnimationFrame(step);
  }
  chartPulseRAF=requestAnimationFrame(step);
}

function stopChartAnimation(){
  if(chartAnimRAF){cancelAnimationFrame(chartAnimRAF);chartAnimRAF=null;}
  if(chartPulseRAF){cancelAnimationFrame(chartPulseRAF);chartPulseRAF=null;}
}

function updateChartLive(){
  const h=data.habits.find(x=>x.id===activeHabitId);if(!h)return;
  const {riskFn,decFn}=getRiskFns(h.name);
  const s=(Date.now()-new Date(h.quitDate).getTime())/1000;
  const risk=riskFn(s);
  const str=risk.toFixed(1);
  const di=str.indexOf('.');
  const phase=getPhaseForHabit(risk,h.name);
  const iEl=document.querySelector('.clr-int');
  const dEl=document.querySelector('.clr-dot');
  const fEl=document.querySelector('.clr-dec');
  if(iEl){iEl.textContent=str.substring(0,di);iEl.style.color=phase.color}
  if(dEl){dEl.style.color=phase.color}
  if(fEl)fEl.textContent=str.substring(di+1);
  const pEl=document.querySelector('.clr-phase');
  if(pEl){pEl.textContent=phase.label;pEl.style.color=phase.color}
  const mEl=document.querySelector('.clr-motive');
  if(mEl)mEl.textContent=getChartMotive(risk,h.name);
}

function setupChartInteraction(){
  const canvas=document.getElementById('risk-chart-canvas');if(!canvas)return;
  canvas.removeEventListener('touchstart',canvas._ts);canvas.removeEventListener('touchmove',canvas._tm);
  canvas.removeEventListener('touchend',canvas._te);canvas.removeEventListener('mousemove',canvas._mm);
  canvas.removeEventListener('mouseleave',canvas._ml);
  const PL=28,PR=16;
  function getDay(clientX){
    const r=canvas.getBoundingClientRect();
    return Math.max(0,Math.min(chartRange,((clientX-r.left-PL)/(r.width-PL-PR))*chartRange));
  }
  canvas._ts=e=>{e.preventDefault();chartActiveTouchDay=getDay(e.touches[0].clientX)};
  canvas._tm=e=>{e.preventDefault();chartActiveTouchDay=getDay(e.touches[0].clientX)};
  canvas._te=()=>{setTimeout(()=>{chartActiveTouchDay=null},1800)};
  canvas._mm=e=>{chartActiveTouchDay=getDay(e.clientX)};
  canvas._ml=()=>{chartActiveTouchDay=null};
  canvas.addEventListener('touchstart',canvas._ts,{passive:false});
  canvas.addEventListener('touchmove',canvas._tm,{passive:false});
  canvas.addEventListener('touchend',canvas._te);
  canvas.addEventListener('mousemove',canvas._mm);
  canvas.addEventListener('mouseleave',canvas._ml);
}

function drawRiskChart(touchDay,progress,ts){
  const canvas=document.getElementById('risk-chart-canvas');if(!canvas)return;
  const h=data.habits.find(x=>x.id===activeHabitId);if(!h)return;
  const {riskFn}=getRiskFns(h.name);
  const elapsed=getElapsed(h.quitDate);
  const currentDays=elapsed.totalSeconds/86400;
  const xMax=chartRange;
  progress=progress??1; ts=ts??0;

  const wrap=canvas.parentElement;
  const W=wrap.clientWidth||300;
  const H=wrap.clientHeight||260;
  canvas.width=W*2;canvas.height=H*2;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(2,2);
  ctx.clearRect(0,0,W,H);

  const pad={top:16,right:16,bottom:26,left:28};
  const cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  const yMax=isSmoking(h.name)?110:100;
  function xPx(d){return pad.left+(d/xMax)*cw}
  function yPx(r){return pad.top+ch-(Math.min(r,yMax)/yMax)*ch}

  // Build curve points up to progress
  const STEPS=400;
  const maxStep=Math.floor(STEPS*progress);
  const pts=[];
  for(let i=0;i<=maxStep;i++){
    const d=(i/STEPS)*xMax;
    pts.push([xPx(d),yPx(riskFn(d*86400))]);
  }
  if(pts.length<2)return;
  const last=pts[pts.length-1];
  const bottom=yPx(0);

  // Gradient fill under curve
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.lineTo(last[0],bottom);
  ctx.lineTo(pts[0][0],bottom);
  ctx.closePath();
  const fillGrd=ctx.createLinearGradient(0,pad.top,0,pad.top+ch);
  fillGrd.addColorStop(0,'rgba(255,69,58,0.28)');
  fillGrd.addColorStop(0.45,'rgba(255,159,10,0.12)');
  fillGrd.addColorStop(1,'rgba(48,209,88,0.02)');
  ctx.fillStyle=fillGrd;ctx.fill();

  // Curve line with horizontal gradient
  const lineGrd=ctx.createLinearGradient(pad.left,0,pad.left+cw*progress,0);
  lineGrd.addColorStop(0,'#ff453a');
  lineGrd.addColorStop(0.22,'#ff9f0a');
  lineGrd.addColorStop(0.5,'#ffd60a');
  lineGrd.addColorStop(1,'#30d158');
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.strokeStyle=lineGrd;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();

  // Minimal Y labels (0, 50, 100)
  ctx.font='500 9px Inter,-apple-system,sans-serif';ctx.textAlign='right';
  ctx.fillStyle='rgba(142,142,147,0.55)';
  [0,50,100].forEach(y=>{if(y<=yMax)ctx.fillText(y+'%',pad.left-5,yPx(y)+3)});

  // Minimal X labels
  const xTicks=xMax<=30?[{d:7,l:'1н'},{d:30,l:'1м'}]
    :xMax<=90?[{d:30,l:'1м'},{d:90,l:'3м'}]
    :xMax<=180?[{d:30,l:'1м'},{d:90,l:'3м'},{d:180,l:'6м'}]
    :xMax<=365?[{d:30,l:'1м'},{d:90,l:'3м'},{d:365,l:'1г'}]
    :[{d:365,l:'1г'},{d:730,l:'2г'},{d:1825,l:'5г'}];
  ctx.textAlign='center';ctx.fillStyle='rgba(142,142,147,0.55)';
  xTicks.forEach(t=>{if(t.d<=xMax)ctx.fillText(t.l,xPx(t.d),H-pad.bottom+12)});

  // Ты здесь — pulsing dot (only after animation done)
  if(progress>=1&&currentDays<=xMax){
    const cx=xPx(currentDays),cy=yPx(riskFn(elapsed.totalSeconds));
    const phase=getPhaseForHabit(riskFn(elapsed.totalSeconds),h.name);
    const pulse=(Math.sin(ts/650)+1)/2;
    const outerR=9+pulse*7;
    const outerGrd=ctx.createRadialGradient(cx,cy,0,cx,cy,outerR);
    outerGrd.addColorStop(0,`rgba(255,255,255,${0.12+pulse*0.10})`);
    outerGrd.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=outerGrd;ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=phase.color;ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1.5;ctx.stroke();
    if(touchDay===null){
      ctx.fillStyle='rgba(255,255,255,0.65)';
      ctx.font='600 10px Inter,-apple-system,sans-serif';
      const right=currentDays>xMax*0.72;
      ctx.textAlign=right?'right':'left';
      ctx.fillText('Ты здесь',cx+(right?-12:12),cy-10);
    }
  }

  // Touch tooltip
  if(touchDay!==null){
    const tx=xPx(touchDay),tr=riskFn(touchDay*86400),ty=yPx(tr);
    const tPhase=getPhaseForHabit(tr,h.name);
    // Dashed vertical line
    ctx.strokeStyle='rgba(255,255,255,0.28)';ctx.lineWidth=1;ctx.setLineDash([3,4]);
    ctx.beginPath();ctx.moveTo(tx,pad.top);ctx.lineTo(tx,pad.top+ch);ctx.stroke();
    ctx.setLineDash([]);
    // Glow halo
    const dg=ctx.createRadialGradient(tx,ty,0,tx,ty,16);
    dg.addColorStop(0,'rgba(255,255,255,0.18)');dg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=dg;ctx.beginPath();ctx.arc(tx,ty,16,0,Math.PI*2);ctx.fill();
    // Dot
    ctx.fillStyle=tPhase.color;ctx.beginPath();ctx.arc(tx,ty,5.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1.5;ctx.stroke();
    // Tooltip box
    const rStr=tr.toFixed(1)+'%';
    const dLabel=touchDay<1?Math.round(touchDay*24)+' ч'
      :touchDay<7?Math.round(touchDay)+' дн'
      :touchDay<30?Math.round(touchDay/7)+' нед'
      :touchDay<365?(touchDay/30).toFixed(1)+' мес'
      :(touchDay/365).toFixed(1)+' г';
    const bW=90,bH=50;
    let bx=tx+16;if(bx+bW>W-pad.right-4)bx=tx-bW-16;
    const by=Math.max(pad.top+4,Math.min(ty-bH/2,pad.top+ch-bH-4));
    ctx.fillStyle='rgba(26,26,28,0.97)';
    ctx.beginPath();ctx.roundRect(bx,by,bW,bH,12);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.75;
    ctx.beginPath();ctx.roundRect(bx,by,bW,bH,12);ctx.stroke();
    ctx.fillStyle=tPhase.color;ctx.font='700 17px Inter,-apple-system,sans-serif';
    ctx.textAlign='center';ctx.fillText(rStr,bx+bW/2,by+21);
    ctx.fillStyle='rgba(142,142,147,0.85)';ctx.font='500 11px Inter,-apple-system,sans-serif';
    ctx.fillText(dLabel,bx+bW/2,by+38);
  }
}

// Risk counter — 10fps update
setInterval(()=>{
  const block=document.querySelector('.risk-block');
  if(!block)return;
  const quit=block.dataset.quit;if(!quit)return;
  const name=block.dataset.name||'';
  const s=(Date.now()-new Date(quit).getTime())/1000;
  const {riskFn,decFn}=getRiskFns(name);
  const risk=riskFn(s);
  const dec=decFn(s);
  const str=risk.toFixed(dec);
  const di=str.indexOf('.');
  const phase=getPhaseForHabit(risk,name);
  const el=document.getElementById('risk-num');
  if(el){
    el.querySelector('.risk-int').textContent=str.substring(0,di);

    el.querySelector('.risk-int').style.color=phase.color;
  }
  const badge=block.querySelector('.risk-phase');
  if(badge){badge.textContent=phase.label;badge.style.color=phase.color;badge.style.background=phase.bg}
